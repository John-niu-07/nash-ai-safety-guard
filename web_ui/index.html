<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ ClawGuard - AI Safety Guard for OpenClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 255, 127, 0.5);
        }
        h1 span { color: #00ff7f; }
        h2 {
            font-size: 1.3em;
            color: #00ff7f;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(0, 255, 127, 0.3);
            padding-bottom: 8px;
        }
        h3 {
            font-size: 1.1em;
            color: #00ccff;
            margin: 15px 0 10px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff7f;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-dot.offline {
            background: #ff5252;
            animation: none;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #00ff7f;
        }
        button {
            background: linear-gradient(135deg, #00ff7f 0%, #00cc66 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 127, 0.4);
        }
        button.danger {
            background: linear-gradient(135deg, #ff5252 0%, #ff3333 100%);
        }
        button.success {
            background: linear-gradient(135deg, #00ff7f 0%, #00cc66 100%);
        }
        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .result.safe {
            background: rgba(0, 255, 127, 0.2);
            border: 1px solid #00ff7f;
        }
        .result.blocked {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid #ff5252;
        }
        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .log-entry.blocked { color: #ff5252; }
        .log-entry.safe { color: #00ff7f; }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge.ml { background: #9c27b0; }
        .badge.pattern { background: #2196f3; }
        .badge.ollama { background: #ff9800; }
        
        /* 配置表单样式 */
        .config-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .config-item:last-child {
            border-bottom: none;
        }
        .config-item label {
            color: #aaa;
            font-size: 13px;
        }
        .config-item input[type="range"] {
            width: 150px;
        }
        .config-item input[type="number"] {
            width: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #fff;
            padding: 5px;
        }
        .config-item select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #fff;
            padding: 5px 10px;
        }
        .config-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        .keywords-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .keyword-tag {
            background: rgba(33, 150, 243, 0.3);
            border: 1px solid #2196f3;
            border-radius: 16px;
            padding: 4px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .keyword-tag button {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            padding: 0;
            margin: 0;
            font-size: 16px;
            line-height: 1;
        }
        .keyword-tag button:hover {
            transform: none;
            box-shadow: none;
        }
        .add-keyword {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .add-keyword input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #fff;
            padding: 8px;
        }
        .layer-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .layer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .layer-title {
            font-size: 14px;
            font-weight: 600;
            color: #00ff7f;
        }
        .layer-status {
            font-size: 12px;
            color: #aaa;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff7f, #00cc66);
            transition: width 0.3s;
        }
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ <span>ClawGuard</span> - AI Safety Guard for OpenClaw</h1>
        
        <!-- 状态和服务层 -->
        <div class="grid">
            <!-- 服务状态 -->
            <div class="card">
                <h2>📊 服务状态</h2>
                <div class="status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">检查中...</span>
                </div>
                <div id="statusDetails" style="margin-top: 15px; font-size: 13px; color: #aaa;"></div>
            </div>
            
            <!-- 检测层信息 -->
            <div class="card full-width">
                <h2>🏗️ 检测层架构</h2>
                <div id="layersContainer">加载中...</div>
            </div>
        </div>
        
        <!-- 配置管理 -->
        <div class="grid">
            <!-- 全局配置 -->
            <div class="card">
                <h2>⚙️ 全局配置</h2>
                <div id="globalConfig">加载中...</div>
            </div>
            
            <!-- 模式匹配配置 -->
            <div class="card">
                <h2>🔍 模式匹配</h2>
                <div id="patternConfig">加载中...</div>
            </div>
            
            <!-- ML 模型配置 -->
            <div class="card">
                <h2>🤖 ML 模型</h2>
                <div id="mlConfig">加载中...</div>
            </div>
            
            <!-- Ollama 配置 -->
            <div class="card">
                <h2>🦙 Ollama (可选)</h2>
                <div id="ollamaConfig">加载中...</div>
            </div>
        </div>
        
        <!-- 测试 -->
        <div class="card" style="margin-bottom: 20px;">
            <h2>🧪 实时测试</h2>
            <textarea id="testInput" placeholder="输入要测试的内容..."></textarea>
            <button onclick="testCheck()">检测</button>
            <div id="testResult"></div>
        </div>
        
        <!-- 拦截日志 -->
        <div class="card" style="margin-bottom: 20px;">
            <h2>🚫 拦截日志</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button onclick="loadBlockedLogs()">刷新</button>
                <button onclick="clearBlockedLogs()" class="danger">清空日志</button>
            </div>
            <div class="log-container" id="blockedLogContainer" style="max-height: 400px;"></div>
        </div>
        
        <!-- 日志 -->
        <div class="card">
            <h2>📜 最近日志</h2>
            <button onclick="loadLogs()" style="margin-bottom: 10px;">刷新</button>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
